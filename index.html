  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
    :root {
      --accent: #7A1F2B;
      --accent-soft: color-mix(in oklab, var(--accent) 12%, #fff);
      --accent-ghost: color-mix(in oklab, var(--accent) 6%, #fff);

      --bg: oklch(0.975 0.006 75);
      --bg-2: oklch(0.985 0.005 75);
      --panel: #fff;
      --ink: oklch(0.20 0.015 50);
      --ink-2: oklch(0.40 0.015 50);
      --ink-3: oklch(0.58 0.012 50);
      --line: oklch(0.90 0.008 75);
      --line-2: oklch(0.94 0.006 75);
      --line-strong: oklch(0.82 0.010 75);

      --ok: oklch(0.46 0.10 145);
      --ok-soft: oklch(0.94 0.06 145);

      --row-h: 64px;
      --col-name-w: 280px;
      --col-feat-w: 92px;
      --col-end-w: 130px;

      --radius: 10px;
      --radius-sm: 6px;
      --shadow-card: 0 1px 0 oklch(0.92 0.008 75), 0 8px 24px -16px oklch(0.20 0.02 50 / 0.18);
      --shadow-pop: 0 16px 40px -10px oklch(0.20 0.02 50 / 0.28), 0 2px 6px oklch(0.20 0.02 50 / 0.08);

      --font-display: "Bricolage Grotesque", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "Geist", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "cv11", "ss01";
    }
    /* Lock the viewport — only the table scrolls. */
    #root, .page {
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .hero, .foot { flex: 0 0 auto; }
    .table-wrap {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    button { font: inherit; color: inherit; }
    .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

    /* SEO fallback styles — only visible without JS */
    .seo-static { max-width: 920px; margin: 40px auto; padding: 0 24px; font-family: Georgia, serif; }
    .seo-static h1 { font-size: 32px; font-weight: 500; margin: 0 0 12px; }
    .seo-static p { color: #555; line-height: 1.55; }
    .seo-static ul { columns: 2; column-gap: 28px; padding-left: 18px; }

    /* ── Hero ──────────────────────────────────────────────────────────────── */
    .hero {
      background: var(--bg);
    }
    .hero-inner {
      max-width: 880px;
      margin: 0 auto;
      padding: 36px 32px 16px;
      text-align: center;
    }
    .hero-kicker {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .hero-kicker::before,
    .hero-kicker::after {
      content: ""; display: inline-block;
      width: 18px; height: 1px;
      background: color-mix(in oklab, var(--accent) 60%, transparent);
    }
    .hero-title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(26px, 2.8vw, 38px);
      line-height: 1.12;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
      text-wrap: balance;
    }
    .hero-lead {
      font-size: 14.5px;
      color: var(--ink-2);
      max-width: 60ch;
      margin: 0 auto;
      text-wrap: pretty;
    }
    .meta-pill {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-2);
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: var(--bg-2);
      border-radius: 999px;
    }
    .meta-pill .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ok);
    }

    /* ── Table wrap ────────────────────────────────────────────────────────── */
    .table-wrap {
      margin: 0;
      padding: 0 32px;
    }
    .table-scroll {
      overflow: auto;
      flex: 1 1 auto;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow-card);
      scrollbar-color: var(--ink-3) transparent;
    }
    .table-scroll::-webkit-scrollbar { height: 12px; }
    .table-scroll::-webkit-scrollbar-track { background: var(--bg-2); }
    .table-scroll::-webkit-scrollbar-thumb {
      background: color-mix(in oklab, var(--ink) 25%, var(--bg-2));
      border-radius: 999px;
      border: 3px solid var(--bg-2);
    }

    .ctable {
      border-collapse: separate;
      border-spacing: 0;
      width: max-content;
      min-width: 100%;
      font-variant-numeric: tabular-nums;
    }

    /* Sticky first column */
    .sticky-col {
      position: sticky;
      left: 0;
      z-index: 5;
      background: var(--panel);
    }
    .table-scroll.with-shadow .sticky-col::after {
      content: "";
      position: absolute;
      top: 0; right: -1px; bottom: 0;
      width: 12px;
      pointer-events: none;
      background: linear-gradient(to right, oklch(0.20 0.02 50 / 0.08), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .table-scroll.with-shadow.is-scrolled .sticky-col::after { opacity: 1; }

    /* Mirror shadow on the right sticky column (Детайли). Visible by
       default and hidden only when the user has scrolled to the rightmost
       position (.is-end set by the JS at the bottom of the file). */
    .table-scroll.with-shadow .endcell::before,
    .table-scroll.with-shadow .head-end::before,
    .table-scroll.with-shadow .ghead-end::before {
      content: "";
      position: absolute;
      top: 0; left: -1px; bottom: 0;
      width: 12px;
      pointer-events: none;
      background: linear-gradient(to left, oklch(0.20 0.02 50 / 0.08), transparent);
      opacity: 1;
      transition: opacity .2s;
    }
    .table-scroll.with-shadow.is-end .endcell::before,
    .table-scroll.with-shadow.is-end .head-end::before,
    .table-scroll.with-shadow.is-end .ghead-end::before { opacity: 0; }

    /* Group header row */
    .grouprow .ghead {
      background: var(--bg-2);
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-3);
      font-weight: 500;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line-2);
      text-align: left;
    }
    .grouprow .ghead-group {
      text-align: center;
      border-left: 1px solid var(--line-2);
      position: relative;
    }
    .grouprow .ghead-group:first-of-type { border-left-color: var(--line); }
    .grouprow .ghead.sticky-col { z-index: 6; border-bottom: 1px solid var(--line); }
    .grouprow .ghead-end { background: var(--bg-2); }
    .ghead-label { font-size: 10.5px; }

    /* Column header row — sticky below the group band so labels stay
       visible while the body scrolls. (--group-h is set in CSS below.) */
    :root { --group-h: 36px; }
    .headrow .head {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 12px 8px;
      font-weight: 500;
      font-size: 12.5px;
      color: var(--ink-2);
      text-align: center;
      vertical-align: middle;
      position: sticky;
      top: var(--group-h);
      z-index: 4;
    }
    .headrow .head.sticky-col {
      text-align: left;
      padding: 12px 16px;
      z-index: 6;
    }
    .grouprow .ghead, .grouprow .ghead-end {
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .grouprow .ghead.sticky-col { z-index: 7; }
    .head-label { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--ink); }
    .head-feat-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-2);
      letter-spacing: 0.04em;
      cursor: help;
      padding: 4px 6px;
      border-radius: 4px;
      transition: background .15s, color .15s;
    }
    .head-feat-label:hover { background: var(--bg-2); color: var(--ink); }
    .head-sortable { cursor: pointer; user-select: none; }
    .head-sortable:hover .head-label,
    .head-sortable:hover .head-feat-label { color: var(--ink); }
    .head-sort-active .head-feat-label,
    .head-sort-active .head-label { color: var(--ink); font-weight: 600; }
    .sort-arrow { margin-left: 4px; vertical-align: -1px; }
    .cell--info { padding: 0; }
    .info-cell {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
      padding: 14px 8px;
    }
    .info-bar {
      width: 60px; height: 5px;
      background: var(--line-2);
      border-radius: 999px;
      overflow: hidden;
    }
    .info-fill {
      height: 100%;
      background: var(--ok);
      border-radius: 999px;
      transition: width .2s;
    }
    .info-pct { font-size: 11px; color: var(--ink-2); }

    /* Body rows */
    .bodyrow { transition: background .15s; }
    .bodyrow:hover .namecell,
    .bodyrow:hover .cell,
    .bodyrow:hover .endcell { background: var(--accent-ghost); }
    .bodyrow + .bodyrow .namecell,
    .bodyrow + .bodyrow .cell,
    .bodyrow + .bodyrow .endcell { border-top: 1px solid var(--line-2); }

    .namecell {
      text-align: left;
      padding: 14px 16px;
      vertical-align: middle;
      height: var(--row-h);
      font-weight: inherit;
      transition: background .15s;
    }
    .namecell .rank {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-3);
      display: inline-block;
      margin-right: 10px;
      width: 22px;
      vertical-align: middle;
    }
    .namebox { display: inline-block; vertical-align: middle; }
    .cname {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      color: var(--ink);
      letter-spacing: -0.005em;
    }
    .cmeta {
      font-size: 11.5px;
      color: var(--ink-3);
      margin-top: 2px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Cell (feature) */
    .cell {
      text-align: center;
      vertical-align: middle;
      height: var(--row-h);
      padding: 0;
      transition: background .15s;
      border-left: 1px solid var(--line-2);
    }
    .cell-btn {
      width: 100%;
      height: 100%;
      min-height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: grid;
      place-items: center;
      padding: 12px 8px;
      border-radius: 0;
      transition: background .15s;
      color: inherit;
      text-decoration: none;
    }
    a.cell-btn { color: inherit; text-decoration: none; }
    .cell-btn:disabled { cursor: default; }
    .cell-btn:not(:disabled):hover,
    a.cell-btn:hover { background: color-mix(in oklab, var(--accent) 8%, transparent); }
    .cell-mark {
      display: inline-grid; place-items: center;
      width: 26px; height: 26px;
      border-radius: 50%;
      transition: transform .15s, background .15s;
    }
    .cell--yes .cell-mark {
      background: var(--ok-soft);
      color: var(--ok);
    }
    .cell--no .cell-mark {
      background: var(--line-2);
      color: var(--ink-3);
      opacity: 0.7;
    }
    .cell-btn:not(:disabled):hover .cell-mark {
      transform: scale(1.1);
    }

    /* End cell with Детайли */
    .endcell {
      padding: 12px 16px;
      height: var(--row-h);
      vertical-align: middle;
      text-align: right;
      border-left: 1px solid var(--line);
      background: var(--panel);
      transition: background .15s;
      position: sticky;
      right: 0;
      z-index: 3;
    }
    .head-end, .ghead-end {
      position: sticky;
      right: 0;
    }
    .headrow .head-end { z-index: 5; background: var(--panel); }
    .grouprow .ghead-end { z-index: 6; background: var(--bg-2); }
    .details-btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: var(--bg);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s, transform .1s;
      white-space: nowrap;
    }
    .details-btn:hover { background: var(--accent); border-color: var(--accent); }
    .details-btn:active { transform: scale(0.97); }

    /* ── Footer ────────────────────────────────────────────────────────────── */
    .foot {
      margin-top: 0;
      background: var(--bg-2);
    }
    .foot-inner {
      max-width: 1280px; margin: 0 auto;
      padding: 10px 32px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px;
      font-size: 12.5px;
      color: var(--ink-3);
    }
    .foot-cta {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
      padding-bottom: 1px;
      transition: border-color .15s;
    }
    .foot-cta:hover { border-bottom-color: var(--accent); }

    /* ── Tooltip ───────────────────────────────────────────────────────────── */
    .tooltip {
      background: var(--ink);
      color: var(--bg);
      font-size: 11.5px;
      font-family: var(--font-mono);
      padding: 6px 9px;
      border-radius: 6px;
      white-space: nowrap;
      transform: translate(-50%, -100%);
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 4px 12px oklch(0.20 0.02 50 / 0.25);
      letter-spacing: 0.01em;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Popover ───────────────────────────────────────────────────────────── */
    .popover {
      position: fixed;
      z-index: 200;
      width: 320px;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow-pop);
      padding: 14px;
      animation: popIn .12s ease-out;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .po-head { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--line); }
    .po-eyebrow {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .po-title { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--ink); }
    .po-row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; padding: 5px 0; align-items: start; }
    .po-row-k { font-size: 11px; color: var(--ink-3); letter-spacing: 0.02em; text-transform: uppercase; font-family: var(--font-mono); padding-top: 2px; }
    .po-row-v {
      font-size: 13px;
      color: var(--ink);
      display: flex; gap: 6px; align-items: center;
      word-break: break-word;
    }
    .po-row-v.mono { font-family: var(--font-mono); font-size: 12px; }
    .po-copy {
      border: none;
      background: var(--line-2);
      color: var(--ink-2);
      width: 22px; height: 22px;
      border-radius: 4px;
      display: inline-grid; place-items: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 10px;
      padding: 0 4px;
      transition: background .15s, color .15s;
    }
    .po-copy:hover { background: var(--ink); color: var(--bg); }
    .po-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 10px;
      background: var(--accent-soft);
      border-radius: 6px;
    }
    .po-link:hover { background: color-mix(in oklab, var(--accent) 18%, #fff); }
    .po-body { font-size: 13px; }

    /* ── Drawer ────────────────────────────────────────────────────────────── */
    .drawer-scrim {
      position: fixed; inset: 0;
      background: oklch(0.20 0.02 50 / 0.32);
      z-index: 500;
      display: flex; justify-content: flex-end;
      animation: scrimIn .2s ease-out;
    }
    @keyframes scrimIn { from { opacity: 0; } to { opacity: 1; } }
    .drawer {
      width: min(620px, 100vw);
      height: 100%;
      background: var(--panel);
      overflow-y: auto;
      animation: drawerIn .22s cubic-bezier(.2,.7,.2,1);
      box-shadow: -20px 0 50px -10px oklch(0.20 0.02 50 / 0.25);
    }
    @keyframes drawerIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .drawer-head {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 18px;
      position: sticky; top: 0; z-index: 2;
      background: var(--panel);
    }
    .drawer-eyebrow {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .drawer-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 26px;
      letter-spacing: -0.015em;
      margin: 0;
      color: var(--ink);
    }
    .drawer-tagline { color: var(--ink-3); margin-top: 4px; font-size: 13.5px; }
    .drawer-close {
      border: 1px solid var(--line);
      background: var(--panel);
      width: 32px; height: 32px;
      border-radius: 50%;
      display: grid; place-items: center;
      cursor: pointer;
      color: var(--ink-2);
    }
    .drawer-close:hover { background: var(--bg-2); color: var(--ink); }
    .drawer-stats {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
      column-gap: 20px;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
    }
    .stat { padding: 18px 0 18px 0; position: relative; min-width: 0; }
    .stat:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 18px; bottom: 18px;
      right: -10px;
      width: 0;
      border-right: 1px dashed var(--line);
    }
    .stat-k {
